name: Daily Index Data Download

on:
  schedule:
    # Runs Mon-Fri at 22:00 UTC (after US market close ~4pm EST)
    - cron: "0 22 * * 1-5"
  workflow_dispatch:   # allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download index data + benchmarks, render snapshot
        run: python main.py --snapshot

      - name: Commit and push new data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market_data/ data/logs/ data/snapshots.db snapshots/
          git diff --cached --quiet || git commit -m "chore: daily update $(date -u +%Y-%m-%d)"
          git push
